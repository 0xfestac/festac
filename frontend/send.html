<div class="container">
  <h2>Send Money</h2>

  <div class="card">
    <input id="toEmail" placeholder="Receiver Email">
    <input id="amount" placeholder="Amount">
    <button onclick="openPinModal()">Send</button>
  </div>
</div>

<!-- PIN MODAL -->
<div id="pinModal" class="modal">
  <div class="modal-content">
    <h3>Enter PIN</h3>
    <input id="pinInput" type="password" maxlength="4">
    <button onclick="confirmSend()">Confirm</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>
